<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>李灿宁 · Canning Li</title>

  <script>
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav>
    <div class="container nav-container">
      <a href="#" class="logo">
        <span class="logo-text">Canning</span>
        <div class="logo-dot"></div>
      </a>

      <div class="nav-actions">
        <div class="nav-links">
          <a href="#recent" data-i18n="nav.recent">近期工作</a>
          <a href="#projects" data-i18n="nav.projects">项目案例</a>
          <a href="#timeline" data-i18n="nav.timeline">经历</a>
          <a href="#skills" data-i18n="nav.skills">专业能力</a>
        </div>

        <div class="nav-controls">
          <button class="control-btn lang-toggle" aria-label="Toggle Language">English</button>
          <button class="control-btn theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-sun sun-icon"></i>
            <i class="fas fa-moon moon-icon"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <section id="intro" class="intro">
    <div class="bg-decoration"></div>
    <div class="container flex-center column">
      <div class="avatar-container">
        <img src="assets/images/avatar.jpg" alt="李灿宁" class="avatar">
      </div>
      <h1 class="gradient-text" data-i18n="intro.title">你好，我是李灿宁</h1>
      <p class="subtitle" data-i18n="intro.desc"></p>
      <div class="intro-contact-links" aria-label="联系方式"></div>
    </div>
  </section>

  <section id="recent" class="section-padding">
    <div class="container">
      <h2 data-i18n="recent.title">近期工作</h2>
      <div class="recent-grid"></div>
    </div>
  </section>

  <section id="projects" class="section-padding">
    <div class="container">
      <h2 data-i18n="projects.title">项目案例</h2>
      <div class="projects-grid"></div>
    </div>
  </section>

  <section id="timeline" class="section-padding">
    <div class="container">
      <h2 data-i18n="timeline.title">经历</h2>
      <div class="timeline-container"></div>
    </div>

  <section id="skills" class="section-padding">
    <div class="container">
      <h2 data-i18n="skills.title">专业能力</h2>
      <div class="skills-wrapper"></div>

  </section>

  <footer data-i18n="footer.copyright">© 2026 李灿宁 | 个人主页</footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js?v=3"></script>

</html>
